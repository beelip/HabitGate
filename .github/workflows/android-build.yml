name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Normalize APK name
        run: |
          mkdir -p build-artifacts
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" build-artifacts/habit-gate.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habit-gate-apk
          path: build-artifacts/habit-gate.apk

      - name: Commit APK to repository
        run: |
          mkdir -p build
          cp build-artifacts/habit-gate.apk build/habit-gate.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/habit-gate.apk
          if git diff --cached --quiet; then
            echo "APK is unchanged, skipping commit."
          else
            git commit -m "ビルド済み APK を更新 [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
